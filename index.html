<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ongoing Charity - Mohamed Rifaat</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-color: #c9a227;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 1px solid #333;
        }

        h1 { font-size: 1.1rem; color: var(--accent-color); margin-bottom: 0.5rem; font-weight: 300; }
        .father-name { font-weight: 700; font-size: 1.4rem; margin-bottom: 1.5rem; color: #fff; }
        
        #dua-display {
            min-height: 80px;
            color: var(--text-dim);
            font-style: italic;
            margin-bottom: 2rem;
            transition: opacity 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .player-container {
            background: #222;
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid #333;
        }

        #status-text {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 1rem;
        }

        audio { width: 100%; filter: invert(100%); }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>صدقة جارية عن روح المرحوم بإذن الله</h1>
    <div class="father-name">محمد رفعت لطفي شاكر أبو العافية</div>
    
    <div id="dua-display">اللهم اغفر له وارحمه وعافه واعف عنه</div>

    <div class="player-container">
        <p id="status-text">اضغط Play لبدء البث المباشر (HTTPS)</p>
        <audio id="main-player" controls>
            <source src="https://stream.radios.com.br/15444" type="audio/mpeg">
            <source src="https://backup.qurango.net/radio/mix" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="footer-note">BrosTec Protocol - Secured Stream V1.2</div>
</div>

<script>
    const duas = [
        "اللهم اغفر له وارحمه وعافه واعف عنه وأكرم نزله",
        "اللهم جازه عن الإحسان إحساناً وعن الإساءة عفواً وغفراناً",
        "اللهم آنس وحدته وآنس وحشته وآنس غربته",
        "اللهم اجعل قبره روضة من رياض الجنة",
        "اللهم عامله بما أنت أهله ولا تعامله بما هو أهله",
        "اللهم املأ قبره بالرضا والنور والفسحة والسرور",
        "اللهم إنه كان لكتابك تالياً وسامعاً فشفع فيه القرآن",
        "اللهم ارحمه فوق الأرض وتحت الأرض ويوم العرض عليك"
    ];

    const duaElement = document.getElementById('dua-display');
    const player = document.getElementById('main-player');
    const status = document.getElementById('status-text');

    function changeDua() {
        duaElement.style.opacity = 0;
        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * duas.length);
            duaElement.textContent = duas[randomIndex];
            duaElement.style.opacity = 1;
        }, 800);
    }

    setInterval(changeDua, 10000);

    player.onplay = () => { status.textContent = "يتم الآن بث القرآن الكريم.. أجر لي ولك"; };
    
    // محاولة التشغيل التلقائي عند التفاعل مع الصفحة
    document.body.onclick = () => {
        if (player.paused) {
            player.play().catch(e => console.log("Autoplay prevented"));
        }
    };
</script>

</body>
</html>
